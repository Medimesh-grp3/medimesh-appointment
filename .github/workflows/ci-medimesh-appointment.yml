name: "CI/CD — medimesh-appointment"

run-name: "medimesh-appointment — ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  push:
    branches: [main]
    paths:
      - "services/medimesh-appointment/**"
      - ".github/workflows/ci-medimesh-appointment.yml"
      - ".github/workflows/template-ci.yml"

  pull_request:
    branches: [main]
    paths:
      - "services/medimesh-appointment/**"
      - ".github/workflows/ci-medimesh-appointment.yml"
      - ".github/workflows/template-ci.yml"

permissions:
  contents: write

jobs:
  call-template:
    uses: Medimesh-grp3/template-ci/.github/workflows/template-ci.yml@main

    with:
      service_name: medimesh-appointment
      service_path: services/medimesh-appointment
      docker_image_name: medimesh_medimesh-appointment
      sonar_project_key: medimesh-appointment
      node_version: "20"

      # 🔥 NEW (VERY IMPORTANT)
      values_key: appointment
      manifest_repo: Medimesh-grp3/ArgoCDrepo

    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      # 🔥 REQUIRED FOR CD
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}

